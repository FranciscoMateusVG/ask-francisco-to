version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: askfrancisco-app
    restart: unless-stopped
    ports:
      - '18432:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
      ADMIN_SECRET: ${ADMIN_SECRET}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@askfrancisco-db:5432/askfranciscoto
    depends_on:
      askfrancisco-db:
        condition: service_healthy
    networks:
      - askfrancisco-network
      - dokploy-network
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  askfrancisco-db:
    image: postgres:16-alpine
    container_name: askfrancisco-db
    restart: unless-stopped
    ports:
      - '18433:5432'
    environment:
      POSTGRES_DB: askfranciscoto
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - askfrancisco_postgres_data:/var/lib/postgresql/data
    networks:
      - askfrancisco-network
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  askfrancisco_postgres_data:
    driver: local

networks:
  askfrancisco-network:
    driver: bridge
  dokploy-network:
    external: true
